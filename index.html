<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目管理平台 - 登录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-wrap{display:flex;align-items:center;justify-content:center;width:100%;min-height:100vh;padding:20px}
.login-card{background:#fff;border-radius:16px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.06)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.login-logo-icon{width:44px;height:44px;background:#2563eb;border-radius:10px;display:flex;align-items:center;justify-content:center}
.login-logo-icon svg{width:24px;height:24px;fill:#fff}
.login-logo-text h1{font-size:18px;font-weight:700;color:#1a1a2e;line-height:1.3}
.login-logo-text p{font-size:12px;color:#6b7280;margin-top:2px}
.login-title{text-align:center;font-size:13px;color:#9ca3af;margin-bottom:28px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
.form-group input{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;color:#1a1a2e;background:#fafafa;transition:border-color .2s,background .2s;outline:none}
.form-group input:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-group input::placeholder{color:#9ca3af}
.login-btn{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s,transform .1s;margin-top:8px}
.login-btn:hover{background:#1d4ed8}
.login-btn:active{transform:scale(.99)}
.login-footer{margin-top:20px;text-align:center;font-size:12px;color:#9ca3af}
</style>
</head>
<body>
<div class="login-wrap">
<div class="login-card">
  <div class="login-logo">
    <div class="login-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
    </div>
    <div class="login-logo-text">
      <h1>项目管理系统</h1>
      <p>Project Manage System</p>
    </div>
  </div>
  <div class="login-title">用户登录</div>
  <form onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>账号</label>
      <input type="text" id="username" placeholder="请输入账号" autocomplete="off">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码">
    </div>
    <button type="submit" class="login-btn">登 录</button>
  </form>
  <div class="login-footer">默认账号 admin / 密码 123456</div>
</div>
</div>
<script>
function handleLogin(e){
  e.preventDefault();
  var u=document.getElementById('username').value.trim();
  var p=document.getElementById('password').value;
  if(u==='admin'&&p==='123456'){
    sessionStorage.setItem('isLoggedIn','true');
    sessionStorage.setItem('username',u);
    var btn=document.querySelector('.login-btn');
    btn.textContent='登录成功！';
    btn.style.background='#16a34a';
    setTimeout(function(){window.location.href='dashboard.html';},800);
  } else {
    var btn=document.querySelector('.login-btn');
    btn.textContent='密码错误，请重试';
    btn.style.background='#dc2626';
    setTimeout(function(){
      btn.textContent='登 录';
      btn.style.background='#2563eb';
      document.getElementById('password').value='';
    },1500);
  }
}
</script>
</body>
</html>
