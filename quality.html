<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>质保金管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.topbar{background:#fff;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:100}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-logo-icon{width:34px;height:34px;background:#9333ea;border-radius:8px;display:flex;align-items:center;justify-content:center}
.topbar-logo-icon svg{width:18px;height:18px;fill:#fff}
.topbar-logo h1{font-size:15px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-user{display:flex;align-items:center;gap:8px;font-size:13px;color:#6b7280;font-weight:500}
.topbar-user span{width:32px;height:32px;background:#f3e8ff;color:#9333ea;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600}
.logout-btn{padding:7px 14px;background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500;transition:background .2s}
.logout-btn:hover{background:#e5e7eb}
.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:200px;background:#fff;border-right:1px solid #e5e7eb;padding:20px 0;flex-shrink:0}
.nav-section{margin-bottom:4px}
.nav-label{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.8px;padding:8px 16px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:14px;color:#374151;font-weight:500;cursor:pointer;text-decoration:none;transition:background .15s,color .15s;border-radius:6px;margin:1px 8px}
.nav-item:hover{background:#f3f4f6;color:#1a1a2e}
.nav-item.active{background:#f3e8ff;color:#9333ea;font-weight:600}
.nav-item svg{width:16px;height:16px;fill:currentColor;flex-shrink:0}
.nav-divider{height:1px;background:#e5e7eb;margin:12px 16px}
.main{flex:1;padding:24px;overflow-x:auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-title{font-size:20px;font-weight:700;color:#1a1a2e}
.page-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:background .2s,transform .1s}
.btn:active{transform:scale(.98)}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-purple{background:#9333ea;color:#fff}
.btn-purple:hover{background:#7e22ce}
.btn-outline{background:#fff;color:#374151;border:1px solid #e5e7eb}
.btn-outline:hover{background:#f3f4f6}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid #e5e7eb}
.stat-label{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-value{font-size:26px;font-weight:700;color:#1a1a2e}
.stat-sub{font-size:12px;color:#6b7280;margin-top:4px}
.card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;margin-bottom:16px}
.card-header{padding:16px 20px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.card-title{font-size:14px;font-weight:700;color:#1a1a2e}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-select{padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:13px;color:#374151;background:#fafafa;cursor:pointer;outline:none}
.filter-select:focus{border-color:#2563eb}
.search-input{padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:13px;color:#374151;background:#fafafa;outline:none;width:180px}
.search-input:focus{border-color:#2563eb;background:#fff}
.card-body{padding:0}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;text-align:left;background:#fafafa;border-bottom:1px solid #e5e7eb;white-space:nowrap}
td{padding:11px 14px;font-size:13px;color:#374151;border-bottom:1px solid #f3f4f6;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-green{background:#f0fdf4;color:#16a34a}
.badge-yellow{background:#fefce8;color:#ca8a04}
.badge-red{background:#fef2f2;color:#dc2626}
.badge-blue{background:#eff6ff;color:#2563eb}
.badge-purple{background:#f3e8ff;color:#9333ea}
.badge-gray{background:#f9fafb;color:#6b7280;border:1px solid #e5e7eb}
.action-btn{padding:4px 10px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:background .2s}
.action-edit{background:#eff6ff;color:#2563eb}
.action-edit:hover{background:#dbeafe}
.action-del{background:#fef2f2;color:#dc2626;margin-left:4px}
.action-del:hover{background:#fee2e2}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}}
.chart-box{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:16px 20px}
.chart-title{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:12px}
.chart-container{position:relative;height:200px}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:1px solid #f3f4f6;flex-wrap:wrap;gap:8px}
.pagination-info{font-size:12px;color:#9ca3af}
.pagination-btn{padding:6px 12px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;color:#374151;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s}
.pagination-btn:hover{background:#f3f4f6}
.pagination-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}
.pagination-btn:disabled{opacity:.4;cursor:not-allowed}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{padding:18px 24px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700;color:#1a1a2e}
.modal-close{width:28px;height:28px;border-radius:6px;border:none;background:#f3f4f6;color:#6b7280;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#e5e7eb}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid #f3f4f6;display:flex;justify-content:flex-end;gap:8px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;display:block}
.form-input,.form-select{width:100%;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:13px;color:#1a1a2e;background:#fafafa;outline:none;transition:border-color .2s,background .2s}
.form-input:focus,.form-select:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.form-input::placeholder{color:#9ca3af}
.form-textarea{width:100%;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:13px;color:#1a1a2e;background:#fafafa;outline:none;resize:vertical;min-height:80px;font-family:inherit;transition:border-color .2s,background .2s}
.form-textarea:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.empty-state{text-align:center;padding:48px 20px;color:#9ca3af}
.empty-state svg{width:40px;height:40px;fill:#e5e7eb;margin-bottom:12px}
.empty-state p{font-size:13px}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">
    <div class="topbar-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
    </div>
    <h1>质保金管理</h1>
  </div>
  <div class="topbar-right">
    <div class="topbar-user"><span>Q</span><span id="showUser">admin</span></div>
    <button class="logout-btn" onclick="logout()">退出登录</button>
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="nav-section">
      <div class="nav-label">主导航</div>
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        仪表盘
      </a>
      <div class="nav-label">业务模块</div>
      <a href="service.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>
        售后管理
      </a>
      <a href="visit.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M12 5.9c1.16 0 2.1.94 2.1 2.1s-.94 2.1-2.1 2.1S9.9 9.16 9.9 8s.94-2.1 2.1-2.1m0 9c2.97 0 6.1 1.46 6.1 2.1v1.1H5.9V17c0-.64 3.13-2.1 6.1-2.1M12 4C9.79 4 8 5.79 8 8s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 9c-2.67 0-8 1.34-8 4v3h16v-3c0-2.66-5.33-4-8-4z"/></svg>
        回访管理
      </a>
      <a href="inspection.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        巡检管理
      </a>
      <a href="quality.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
        质保金管理
      </a>
      <div class="nav-divider"></div>
      <a href="admin.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        管理员后台
      </a>
    </div>
  </div>
  <div class="main">
    <div class="page-header">
      <div class="page-title">🛡️ 质保金管理系统</div>
      <div class="page-actions">
        <button class="btn btn-outline" onclick="exportCSV()">导出CSV</button>
        <button class="btn btn-purple" onclick="openModal()">+ 新增记录</button>
      </div>
    </div>
    <div class="stats-row" id="statsRow"></div>
    <div class="chart-grid">
      <div class="chart-box">
        <div class="chart-title">质保金金额统计（万元）</div>
        <div class="chart-container"><canvas id="barChart"></canvas></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">质保金到期状态分布</div>
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">质保金记录列表</div>
        <div class="filters">
          <select class="filter-select" id="filterStatus" onchange="render()">
            <option value="">全部状态</option><option value="未到期">未到期</option><option value="即将到期">即将到期</option><option value="已到期">已到期</option><option value="已退还">已退还</option>
          </select>
          <select class="filter-select" id="filterType" onchange="render()">
            <option value="">全部类型</option><option value="系统集成">系统集成</option><option value="软件">软件</option><option value="硬件">硬件</option><option value="服务">服务</option>
          </select>
          <input type="text" class="search-input" id="searchInput" placeholder="搜索项目名称..." oninput="render()">
        </div>
      </div>
      <div class="card-body">
        <table>
          <thead><tr><th>#</th><th>项目名称</th><th>客户单位</th><th>签订日期</th><th>质保到期日</th><th>质保金额(万)</th><th>类型</th><th>状态</th><th>操作</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pagination">
        <div class="pagination-info" id="pageInfo"></div>
        <div id="pageBtns"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">新增质保金记录</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group full"><label class="form-label">项目名称 *</label><input class="form-input" id="f_project" placeholder="例：智慧城市一期"></div>
        <div class="form-group full"><label class="form-label">客户单位 *</label><input class="form-input" id="f_customer" placeholder="例：某县公安局"></div>
        <div class="form-group"><label class="form-label">签订日期 *</label><input class="form-input" type="date" id="f_signDate"></div>
        <div class="form-group"><label class="form-label">质保到期日 *</label><input class="form-input" type="date" id="f_expireDate"></div>
        <div class="form-group"><label class="form-label">质保金额(万元) *</label><input class="form-input" type="number" id="f_amount" placeholder="5.0" step="0.01"></div>
        <div class="form-group">
          <label class="form-label">项目类型 *</label>
          <select class="form-select" id="f_type">
            <option value="系统集成">系统集成</option><option value="软件">软件</option><option value="硬件">硬件</option><option value="服务">服务</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">状态</label>
          <select class="form-select" id="f_status">
            <option value="未到期">未到期</option><option value="即将到期">即将到期</option><option value="已到期">已到期</option><option value="已退还">已退还</option>
          </select>
        </div>
        <div class="form-group full"><label class="form-label">备注</label><textarea class="form-textarea" id="f_remark" placeholder="备注信息..."></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-purple" onclick="saveRecord()">保存记录</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
if(!sessionStorage.getItem('isLoggedIn'))window.location.href='index.html';
document.getElementById('showUser').textContent=sessionStorage.getItem('username')||'admin';
function logout(){sessionStorage.removeItem('isLoggedIn');window.location.href='index.html';}

var data=JSON.parse(localStorage.getItem('qualityData')||'[]');
var barChart,pieChart;
var currentPage=1;
var pageSize=10;
var editingId=null;

function initCharts(){
  var ctx1=document.getElementById('barChart').getContext('2d');
  var ctx2=document.getElementById('pieChart').getContext('2d');
  barChart=new Chart(ctx1,{type:'bar',options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#f3f4f6'},ticks:{color:'#9ca3af'}},x:{grid:{display:false},ticks:{color:'#6b7280'}}}}});
  pieChart=new Chart(ctx2,{type:'doughnut',options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#6b7280',padding:12,usePointStyle:true,pointStyleWidth:8}}}}});
}

function updateCharts(){
  var notDue=data.filter(function(d){return d.status==='未到期'}).reduce(function(s,d){return s+parseFloat(d.amount||0)},0);
  var soon=data.filter(function(d){return d.status==='即将到期'}).reduce(function(s,d){return s+parseFloat(d.amount||0)},0);
  var expired=data.filter(function(d){return d.status==='已到期'}).reduce(function(s,d){return s+parseFloat(d.amount||0)},0);
  var returned=data.filter(function(d){return d.status==='已退还'}).reduce(function(s,d){return s+parseFloat(d.amount||0)},0);
  var total=data.reduce(function(s,d){return s+parseFloat(d.amount||0)},0);

  barChart.data.labels=['未到期','即将到期','已到期','已退还'];
  barChart.data.datasets[0].data=[notDue,soon,expired,returned];
  barChart.data.datasets[0].backgroundColor=['#2563eb','#ca8a04','#dc2626','#16a34a'];
  barChart.update();

  pieChart.data.labels=['未到期','即将到期','已到期','已退还'];
  pieChart.data.datasets[0].data=[notDue||1,soon||0,expired||0,returned||0];
  pieChart.data.datasets[0].backgroundColor=['#2563eb','#ca8a04','#dc2626','#16a34a'];
  pieChart.update();

  var notDueCount=data.filter(function(d){return d.status==='未到期'}).length;
  var soonCount=data.filter(function(d){return d.status==='即将到期'}).length;
  var expiredCount=data.filter(function(d){return d.status==='已到期'}).length;
  var returnedCount=data.filter(function(d){return d.status==='已退还'}).length;
  document.getElementById('statsRow').innerHTML=''+
    '<div class="stat-card"><div class="stat-label">项目总数</div><div class="stat-value">'+data.length+'</div><div class="stat-sub">质保金总金额 '+total.toFixed(1)}万</div></div>'+
    '<div class="stat-card"><div class="stat-label">未到期</div><div class="stat-value" style="color:#2563eb">'+notDueCount+'</div><div class="stat-sub">'+notDue.toFixed(1)}万</div></div>'+
    '<div class="stat-card"><div class="stat-label">即将到期</div><div class="stat-value" style="color:#ca8a04">'+soonCount+'</div><div class="stat-sub">'+soon.toFixed(1)}万</div></div>'+
    '<div class="stat-card"><div class="stat-label">已到期</div><div class="stat-value" style="color:#dc2626">'+expiredCount+'</div><div class="stat-sub">'+expired.toFixed(1)}万</div></div>'+
    '<div class="stat-card"><div class="stat-label">已退还</div><div class="stat-value" style="color:#16a34a">'+returnedCount+'</div><div class="stat-sub">'+returned.toFixed(1)}万</div></div>';
}

function render(){
  var fs=document.getElementById('filterStatus').value;
  var ft=document.getElementById('filterType').value;
  var kw=document.getElementById('searchInput').value.trim().toLowerCase();
  var filtered=data.filter(function(d){
    return(!fs||d.status===fs)&&(!ft||d.type===ft)&&(!kw||(d.project+''+d.customer+''+d.remark).toLowerCase().includes(kw));
  });
  var totalPages=Math.max(1,Math.ceil(filtered.length/pageSize));
  if(currentPage>totalPages)currentPage=totalPages;
  var start=(currentPage-1)*pageSize;
  var page=filtered.slice(start,start+pageSize);
  var statusMap={'未到期':'badge-blue','即将到期':'badge-yellow','已到期':'badge-red','已退还':'badge-green'};
  document.getElementById('tableBody').innerHTML=page.length?page.map(function(d,i){
    return'<tr><td>'+(start+i+1)+'</td><td title="'+esc(d.project)+'">'+esc(d.project)+'</td><td>'+esc(d.customer)+'</td><td>'+esc(d.signDate)+'</td><td>'+esc(d.expireDate)+'</td><td style="font-weight:600">'+parseFloat(d.amount||0).toFixed(2)+'</td><td><span class="badge badge-gray">'+esc(d.type)+'</span></td><td><span class="badge '+(statusMap[d.status]||'badge-gray')+'">'+esc(d.status)+'</span></td><td><button class="action-btn action-edit" onclick="editRecord(\''+d.id+'\')">编辑</button><button class="action-btn action-del" onclick="delRecord(\''+d.id+'\')">删除</button></td></tr>';
  }).join(''):'<tr><td colspan="9" class="empty-state"><p>暂无数据，点击右上角"+ 新增记录"添加</p></td></tr>';
  document.getElementById('pageInfo').textContent='共 '+filtered.length+' 条，第 '+currentPage+' / '+totalPages+' 页';
  var btns='';
  btns+='<button class="pagination-btn" onclick="goPage('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>上一页</button>';
  for(var p=1;p<=totalPages;p++){if(totalPages<=7||p===1||p===totalPages||Math.abs(p-currentPage)<=2){btns+='<button class="pagination-btn'+(p===currentPage?' active':'')+'" onclick="goPage('+p+')">'+p+'</button>';}}
  btns+='<button class="pagination-btn" onclick="goPage('+(currentPage+1)+')" '+(currentPage===totalPages?'disabled':'')+'>下一页</button>';
  document.getElementById('pageBtns').innerHTML=btns;
}

function goPage(p){currentPage=p;render();}

function openModal(id){
  editingId=id;
  document.getElementById('modal').classList.add('active');
  document.getElementById('modalTitle').textContent=id?'编辑质保金记录':'新增质保金记录';
  if(id){
    var d=data.find(function(x){return x.id===id;});
    if(d){document.getElementById('f_project').value=d.project||'';document.getElementById('f_customer').value=d.customer||'';document.getElementById('f_signDate').value=d.signDate||'';document.getElementById('f_expireDate').value=d.expireDate||'';document.getElementById('f_amount').value=d.amount||'';document.getElementById('f_type').value=d.type||'系统集成';document.getElementById('f_status').value=d.status||'未到期';document.getElementById('f_remark').value=d.remark||'';}
  } else {
    ['f_project','f_customer','f_signDate','f_expireDate','f_amount','f_remark'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('f_type').value='系统集成';
    document.getElementById('f_status').value='未到期';
  }
}

function closeModal(){document.getElementById('modal').classList.remove('active');editingId=null;}

function saveRecord(){
  var project=document.getElementById('f_project').value.trim();
  var customer=document.getElementById('f_customer').value.trim();
  var signDate=document.getElementById('f_signDate').value;
  var expireDate=document.getElementById('f_expireDate').value;
  var amount=document.getElementById('f_amount').value;
  var type=document.getElementById('f_type').value;
  var status=document.getElementById('f_status').value;
  var remark=document.getElementById('f_remark').value.trim();
  if(!project||!customer||!signDate||!expireDate||!amount){alert('请填写必填项');return;}
  var record={id:editingId||Date.now().toString(),project:project,customer:customer,signDate:signDate,expireDate:expireDate,amount:amount,type:type,status:status,remark:remark};
  if(editingId){for(var i=0;i<data.length;i++){if(data[i].id===editingId){data[i]=record;break;}}}
  else{data.unshift(record);}
  localStorage.setItem('qualityData',JSON.stringify(data));
  updateCharts();render();closeModal();
}

function editRecord(id){openModal(id);}

function delRecord(id){
  if(!confirm('确定删除？'))return;
  data=data.filter(function(d){return d.id!==id;});
  localStorage.setItem('qualityData',JSON.stringify(data));
  updateCharts();render();
}

function exportCSV(){
  var csv='项目名称,客户单位,签订日期,质保到期日,质保金额(万),类型,状态,备注\n';
  data.forEach(function(d){csv+='"'+d.project+'","'+d.customer+'","'+d.signDate+'","'+d.expireDate+'","'+d.amount+'","'+d.type+'","'+d.status+'","'+(d.remark||'')+'"\n';});
  var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='质保金统计_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

initCharts();updateCharts();render();
</script>
</body>
</html>
