<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020617;--surface:rgba(10,20,50,0.8);--border:rgba(0,150,255,0.15);--primary:#0088ff;--primary2:#00ccff;--accent:#0055ff;--text:#e0f4ff;--muted:rgba(255,255,255,0.4);--cyan:rgba(0,200,255,0.8)}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(0,100,255,0.12) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(80,0,200,0.1) 0%,transparent 50%);pointer-events:none;z-index:0}
.grid-bg{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,100,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,100,255,0.02) 1px,transparent 1px);background-size:50px 50px;z-index:0}
.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) infinite ease-in-out}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.8}}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--surface);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;backdrop-filter:blur(20px)}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);text-align:center}
.sidebar-logo .logo-icon{width:44px;height:44px;margin:0 auto 10px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,150,255,0.3)}
.sidebar-logo .logo-icon svg{width:24px;height:24px;fill:#fff}
.sidebar-logo .logo-title{font-family:'Orbitron',sans-serif;font-size:13px;color:#fff;letter-spacing:2px;font-weight:700}
.sidebar-logo .logo-sub{font-size:11px;color:var(--muted);margin-top:4px}
.nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;cursor:pointer;transition:all 0.3s;font-size:14px;color:var(--muted);text-decoration:none;margin-bottom:4px;position:relative;overflow:hidden}
.nav-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--primary2);opacity:0;transition:opacity 0.3s}
.nav-item:hover{background:rgba(0,130,255,0.1);color:var(--cyan)}
.nav-item.active{background:rgba(0,130,255,0.15);color:var(--cyan)}
.nav-item.active::before{opacity:1}
.nav-item svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
.nav-section{margin-top:20px}
.nav-section-title{font-size:10px;color:rgba(0,150,255,0.4);letter-spacing:2px;text-transform:uppercase;padding:4px 14px;margin-bottom:4px}
.nav-badge{background:var(--primary);color:#fff;font-size:10px;border-radius:10px;padding:2px 6px;margin-left:auto;font-weight:700}
.sidebar-footer{padding:16px 12px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(0,80,150,0.2);border-radius:10px;cursor:pointer}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;font-family:'Orbitron',sans-serif;flex-shrink:0}
.user-details{overflow:hidden}
.user-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10px;color:var(--muted)}
.main{margin-left:240px;min-height:100vh;position:relative;z-index:1}
.topbar{position:sticky;top:0;z-index:50;background:rgba(2,6,23,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px}
.topbar-title{font-family:'Orbitron',sans-serif;font-size:16px;color:#fff;letter-spacing:2px}
.topbar-right{display:flex;align-items:center;gap:20px}
.topbar-time{font-size:12px;color:var(--muted);font-family:'Orbitron',sans-serif}
.topbar-btn{background:rgba(0,100,255,0.15);border:1px solid rgba(0,150,255,0.2);border-radius:8px;padding:8px 16px;cursor:pointer;color:var(--cyan);font-size:12px;transition:all 0.3s;font-family:'Noto Sans SC',sans-serif}
.topbar-btn:hover{background:rgba(0,130,255,0.3)}
.content{padding:32px}
.dashboard-grid{display:grid;grid-template-columns:1fr 380px;gap:24px;margin-bottom:24px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;position:relative;overflow:hidden;transition:all 0.3s;backdrop-filter:blur(10px)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--primary2))}
.stat-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,100,255,0.15);border-color:rgba(0,150,255,0.3)}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:24px}
.stat-icon.blue{background:rgba(0,100,255,0.15);color:#00aaff}
.stat-icon.green{background:rgba(0,200,100,0.15);color:#00cc66}
.stat-icon.purple{background:rgba(150,0,255,0.15);color:#aa44ff}
.stat-icon.orange{background:rgba(255,120,0,0.15);color:#ff8800}
.stat-num{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:900;color:#fff;margin-bottom:4px}
.stat-num span{font-size:16px;font-weight:400;color:var(--muted)}
.stat-label{font-size:13px;color:var(--muted)}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;backdrop-filter:blur(10px)}
.chart-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.chart-title::before{content:'';width:3px;height:16px;background:linear-gradient(to bottom,var(--primary),var(--primary2));border-radius:2px}
.module-list-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;backdrop-filter:blur(10px)}
.module-item{display:flex;align-items:center;gap:16px;padding:16px;background:rgba(0,50,100,0.2);border-radius:12px;margin-bottom:12px;cursor:pointer;transition:all 0.3s;text-decoration:none;color:inherit;border:1px solid transparent}
.module-item:hover{border-color:rgba(0,150,255,0.3);background:rgba(0,80,150,0.25);transform:translateX(4px)}
.module-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.module-info{flex:1}
.module-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:4px}
.module-meta{font-size:12px;color:var(--muted)}
.module-arrow{color:var(--muted);font-size:18px;transition:transform 0.3s}
.module-item:hover .module-arrow{transform:translateX(4px);color:var(--cyan)}
.recent-section{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
.recent-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;backdrop-filter:blur(10px)}
.recent-card-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.recent-item{padding:12px 0;border-bottom:1px solid rgba(0,150,255,0.08);display:flex;align-items:flex-start;gap:10px}
.recent-item:last-child{border-bottom:none}
.recent-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.recent-text{flex:1}
.recent-name{font-size:13px;color:#fff;margin-bottom:2px}
.recent-meta{font-size:11px;color:var(--muted)}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.empty-state svg{width:40px;height:40px;fill:currentColor;opacity:0.3;margin-bottom:10px}
.glow-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:linear-gradient(135deg,var(--accent),var(--primary));border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans SC',sans-serif;transition:all 0.3s;text-decoration:none;letter-spacing:1px;box-shadow:0 4px 20px rgba(0,100,255,0.3)}
.glow-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,130,255,0.5)}
@media(max-width:1100px){

  .sidebar-logo .logo-title,.sidebar-logo .logo-sub,.nav-section-title,.nav-item span,.user-details,.nav-badge{display:none}
  .main{margin-left:64px}
  .dashboard-grid{grid-template-columns:1fr}
  .stat-row{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .content{padding:16px}
  .stat-row{grid-template-columns:1fr 1fr}
  .recent-section{grid-template-columns:1fr}
}
</style>
</head>

  inspection:[{id:1,projectName:'八路军兰州办事处LED户外大屏采购安装项目',contact:'舒主任',phone:'13893128168',inspectDate:'2025.6.6',inspectLocation:'甘肃省兰州市酒泉路',inspectors:'小张、小李',inspectStatus:'正常',abnormalRecord:'灯珠坏死',processRecord:'现场进行灯珠维修'}]
};

function initData(){
  const keys=['quality','visit','service','inspection'];
  keys.forEach(k=>{
    if(!localStorage.getItem('sys_'+k)){
      localStorage.setItem('sys_'+k,JSON.stringify(DEFAULT_DATA[k]));
    }
  });
}

function getData(key){return JSON.parse(localStorage.getItem('sys_'+key)||'[]');}

function checkAuth(){
  const user=JSON.parse(localStorage.getItem('sys_current_user')||'null');
  if(!user){location.href='index.html';return;}
  document.getElementById('userName').textContent=user.nickname||user.username;
  document.getElementById('userRole').textContent=user.role==='super'?'超级管理员':'管理员';
  document.getElementById('userAvatar').textContent=(user.nickname||user.username).charAt(0).toUpperCase();
  if(user.role!=='super'){
    document.getElementById('navAdmin').style.display='none';
  }
}

function logout(){
  localStorage.removeItem('sys_current_user');
  location.href='index.html';
}

function updateTime(){
  const now=new Date();
  const s=now.getFullYear()+'/'+(now.getMonth()+1).toString().padStart(2,'0')+'/'+now.getDate().toString().padStart(2,'0')+'  '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');
  document.getElementById('topbarTime').textContent=s;
}

function buildStats(){
  const q=getData('quality');const v=getData('visit');const s=getData('service');const i=getData('inspection');
  const totalContract=q.filter(x=>x.contractAmount&&x.contractAmount!=='-').reduce((a,b)=>a+(+b.contractAmount),0);
  const activeWarranty=q.filter(x=>{
    if(!x.warrantyEnd||x.warrantyEnd==='-')return false;
    return new Date(x.warrantyEnd)>=new Date();
  });
  document.getElementById('statRow').innerHTML=`
    <div class="stat-card">
      <div class="stat-icon blue">📊</div>
      <div class="stat-num">${q.length}<span>条</span></div>
      <div class="stat-label">质保金记录</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">🔄</div>
      <div class="stat-num">${v.length}<span>条</span></div>
      <div class="stat-label">项目回访记录</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon purple">🔧</div>
      <div class="stat-num">${s.length}<span>条</span></div>
      <div class="stat-label">售后处理记录</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange">🔍</div>
      <div class="stat-num">${i.length}<span>条</span></div>
      <div class="stat-label">巡检记录</div>
    </div>`;
}

function buildPie(){
  const q=getData('quality');const v=getData('visit');const s=getData('service');const i=getData('inspection');
  const ctx=document.getElementById('pieChart').getContext('2d');
  new Chart(ctx,{
    type:'pie',
    data:{
      labels:['质保金','项目回访','项目售后','项目巡检'],
      datasets:[{
        data:[q.length,v.length,s.length,i.length],
        backgroundColor:['rgba(0,136,255,0.85)','rgba(0,204,100,0.85)','rgba(153,0,255,0.85)','rgba(255,136,0,0.85)'],
        borderColor:'rgba(2,6,23,0.8)',
        borderWidth:3,
        hoverOffset:12
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{position:'bottom',labels:{color:'rgba(255,255,255,0.7)',font:{family:"'Noto Sans SC',sans-serif",size:12},padding:16}},
        tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.raw}条`}}
      },
      animation:{animateRotate:true,duration:1500}
    }
  });
}

function buildRecent(){
  const s=getData('service').slice(0,4);
  const i=getData('inspection').slice(0,4);
  document.getElementById('recentService').innerHTML=s.length?s.map(x=>`<div class="recent-item"><div class="recent-dot" style="background:#aa44ff"></div><div class="recent-text"><div class="recent-name">${x.projectName}</div><div class="recent-meta">${x.issueDetail} · ${x.solveTime||'处理中'}</div></div></div>`).join(''):'<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>暂无售后记录</div>';
  document.getElementById('recentInspection').innerHTML=i.length?i.map(x=>`<div class="recent-item"><div class="recent-dot" style="background:#ff8800"></div><div class="recent-text"><div class="recent-name">${x.projectName}</div><div class="recent-meta">${x.inspectStatus} · ${x.inspectDate}</div></div></div>`).join(''):'<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l4.59-4.58L18 11l-6 6z"/></svg>暂无巡检记录</div>';
}

function makeStars(){
  const el=document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
    el.appendChild(s);
  }
}

window.addEventListener('DOMContentLoaded',()=>{
  initData();
  checkAuth();
  makeStars();
  buildStats();
  buildPie();
  buildRecent();
  updateTime();
  setInterval(updateTime,1000);
});
</script>
</body>
</html>
