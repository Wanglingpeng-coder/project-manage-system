<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目管理平台 - 登录</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#020617;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,100,255,0.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(120,0,255,0.1) 0%,transparent 50%);pointer-events:none}
.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) infinite ease-in-out}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:1}}
.grid-bg{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,150,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,150,255,0.03) 1px,transparent 1px);background-size:60px 60px}
.login-wrap{position:relative;z-index:10;width:420px}
.login-card{background:rgba(10,20,50,0.8);border:1px solid rgba(0,180,255,0.2);border-radius:20px;padding:48px 40px;backdrop-filter:blur(20px);box-shadow:0 0 60px rgba(0,100,255,0.15),inset 0 1px 0 rgba(255,255,255,0.05)}
.logo-area{text-align:center;margin-bottom:40px}
.logo-icon{width:72px;height:72px;margin:0 auto 16px;border-radius:50%;background:linear-gradient(135deg,#0066ff,#00ccff);display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(0,180,255,0.4);animation:pulse-glow 3s ease-in-out infinite}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(0,180,255,0.3)}50%{box-shadow:0 0 50px rgba(0,180,255,0.7)}}
.logo-icon svg{width:40px;height:40px;fill:#fff}
.logo-title{font-family:'Orbitron',sans-serif;font-size:22px;color:#fff;letter-spacing:4px;font-weight:700}
.logo-sub{font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-top:6px}
.input-group{margin-bottom:20px;position:relative}
.input-group label{display:block;font-size:12px;color:rgba(0,180,255,0.8);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
.input-wrap{position:relative}
.input-wrap input{width:100%;padding:14px 18px;background:rgba(0,50,100,0.3);border:1px solid rgba(0,180,255,0.2);border-radius:12px;color:#e0f4ff;font-size:14px;outline:none;transition:all 0.3s;font-family:'Noto Sans SC',sans-serif}
.input-wrap input:focus{border-color:#00ccff;box-shadow:0 0 20px rgba(0,180,255,0.2);background:rgba(0,80,150,0.3)}
.input-wrap input::placeholder{color:rgba(255,255,255,0.2)}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center}
.eye-btn svg{width:18px;height:18px;fill:rgba(255,255,255,0.3);transition:fill 0.3s}
.eye-btn:hover svg{fill:rgba(0,200,255,0.8)}
.error-msg{font-size:12px;color:#ff4466;margin-top:6px;min-height:18px;letter-spacing:0.5px;opacity:0;transition:opacity 0.3s}
.error-msg.show{opacity:1}
.login-btn{width:100%;padding:16px;background:linear-gradient(135deg,#0066ff,#0099ff);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:3px;font-family:'Orbitron',sans-serif;transition:all 0.3s;position:relative;overflow:hidden;margin-top:8px}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,130,255,0.5)}
.login-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transition:left 0.5s}
.login-btn:hover::before{left:100%}
.login-btn:active{transform:translateY(0)}
.hint{text-align:center;margin-top:24px;font-size:12px;color:rgba(255,255,255,0.25);letter-spacing:0.5px}
.hint span{color:rgba(0,180,255,0.6)}
.toast{position:fixed;top:30px;left:50%;transform:translateX(-50%) translateY(-100px);padding:14px 28px;background:rgba(10,20,50,0.95);border:1px solid;border-radius:12px;z-index:9999;font-size:14px;letter-spacing:1px;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);backdrop-filter:blur(10px);min-width:280px;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(0,255,150,0.5);color:#00ffaa;box-shadow:0 0 30px rgba(0,255,150,0.2)}
.toast.error{border-color:rgba(255,60,80,0.5);color:#ff4466;box-shadow:0 0 30px rgba(255,60,80,0.2)}
.scan-line{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,200,255,0.8),transparent);animation:scan 4s linear infinite}
@keyframes scan{0%{top:0}100%{top:100%}}
.forgot{text-align:center;margin-top:16px}
.forgot a{font-size:12px;color:rgba(0,180,255,0.5);text-decoration:none;transition:color 0.3s}
.forgot a:hover{color:rgba(0,200,255,0.9)}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="grid-bg"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="scan-line"></div>
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="logo-title">PRO-MANAGE</div>
      <div class="logo-sub">智能项目管理平台</div>
    </div>
    <div class="input-group">
      <label>用户名</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="off">
      </div>
    </div>
    <div class="input-group">
      <label>密码</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="请输入密码">
        <button class="eye-btn" onclick="togglePwd()">
          <svg id="eye-icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>
    <button class="login-btn" onclick="doLogin()" id="loginBtn">登 录</button>
    <div class="hint">默认账号 <span>admin</span> / 密码 <span>123456</span></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 初始化账号数据
function initUsers(){
  if(!localStorage.getItem('sys_users')){
    localStorage.setItem('sys_users',JSON.stringify([
      {username:'admin',password:'123456',role:'super',nickname:'超级管理员'},
      {username:'user01',password:'111111',role:'admin',nickname:'管理员01'}
    ]));
  }
  if(!localStorage.getItem('sys_login_log')){
    localStorage.setItem('sys_login_log','[]');
  }
}

function togglePwd(){
  const inp=document.getElementById('password');
  inp.type=inp.type==='password'?'text':'password';
}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+type+(type==='success'?' success':' error');
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>t.classList.remove('show'),2500);
}

function logLogin(user,success){
  const logs=JSON.parse(localStorage.getItem('sys_login_log')||'[]');
  logs.unshift({user,t:new Date().toISOString(),success});
  localStorage.setItem('sys_login_log',JSON.stringify(logs.slice(0,100)));
}

function doLogin(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  const err=document.getElementById('errorMsg');
  err.classList.remove('show');
  if(!u||!p){err.textContent='请输入用户名和密码';err.classList.add('show');return;}
  const users=JSON.parse(localStorage.getItem('sys_users')||'[]');
  const found=users.find(x=>x.username===u&&x.password===p);
  if(!found){err.textContent='密码错误，请重新输入';err.classList.add('show');logLogin(u,false);return;}
  logLogin(u,true);
  localStorage.setItem('sys_current_user',JSON.stringify(found));
  showToast('登录成功，正在跳转...','success');
  setTimeout(()=>location.href='dashboard.html',1200);
}

document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('username').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('password').focus();});

// 背景星星
const starsEl=document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
  starsEl.appendChild(s);
}

// 自动聚焦
window.addEventListener('DOMContentLoaded',()=>{initUsers();document.getElementById('username').focus();});
</script>
</body>
</html>
